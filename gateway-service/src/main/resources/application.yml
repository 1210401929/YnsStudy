# 引入公共配置文件,用于脱敏数据库密码等重要信息
spring.config.import: optional:file:secret.yml

eureka:
  client:
    service-url:
      # 指定 eureka 注册中心地址
      defaultZone: ${my-secret.eureka.defaultZone}

server:
  # 当前网关服务的端口
  port: 8889

spring:
  codec:
    max-in-memory-size: 10MB  # 默认只有 256KB，Base64 非常容易超限
  application:
    # 当前网关服务的注册名（以后其他服务访问要用这个名字）
    name: gateway-service

  cloud:
    gateway:
      routes:
         # 图片访问路由
        - id: upload-file
          uri: lb://service-pub-api
          predicates:
            - Path=/uploadFile/**

        # 配置路由1：转发到 service-pub-api 微服务
        - id: pub-api
          uri: lb://service-pub-api
          predicates:
            - Path=/pub-api/**   # 访问 /pub-api/** 的请求都会路由到 service-pub-api

        # 配置路由2：转发到 service-blog-api 微服务
        - id: blog-api
          uri: lb://service-blog-api
          predicates:
            - Path=/blog-api/**    # 访问 /blog-api/** 的请求都会路由到 service-blog-api

        # 配置路由3：转发到 service-ai-api 微服务
        - id: ai-api
          uri: lb://service-ai-api
          predicates:
            - Path=/ai-api/**    # 访问 /ai-api/** 的请求都会路由到 service-ai-api

      discovery:
        locator:
          enabled: true  # 开启服务发现，通过服务名自动匹配转发

logging:
  level:
    org.springframework.cloud.gateway: DEBUG  # 开启网关 debug 日志（方便排查问题）

#接口白名单  无需token就能访问的接口
auth:
  whitelist:
    # pub_api
    - /pub-api/login/**
    # blog_api
    - /blog-api/home/** # 首页
    - /blog-api/userInformation/**  #用户主页
    - /blog-api/blog/addComment   #博客评论接口   允许未登录用户评论
    # 静态文件访问
    - /uploadFile/**

